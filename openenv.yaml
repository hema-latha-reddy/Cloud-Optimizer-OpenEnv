env_id: cloud-optimizer-cracking
version: "1.0.0"

tasks:
  - id: easy
    difficulty: easy
    max_steps: 10
    grader:
      type: llm
      prompt_template: "Score the cloud optimization performance 0.0 to 1.0..."

  - id: medium
    difficulty: medium
    max_steps: 15
    grader:
      type: llm
      prompt_template: "Score the cloud optimization performance 0.0 to 1.0..."

  - id: hard
    difficulty: hard
    max_steps: 20
    grader:
      type: llm
      prompt_template: "Score the cloud optimization performance 0.0 to 1.0..."
