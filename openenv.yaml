env_id: "cloud-optimizer-cracking"
version: "1.0.0"

tasks:
  - id: "easy"
    difficulty: "easy"
    max_steps: 10
    grader:
      type: "llm"
      prompt_template: "Score 0.0 to 1.0 based on latency and server count."
  - id: "medium"
    difficulty: "medium"
    max_steps: 15
    grader:
      type: "llm"
      prompt_template: "Score 0.0 to 1.0. Efficiency is key."
  - id: "hard"
    difficulty: "hard"
    max_steps: 20
    grader:
      type: "llm"
      prompt_template: "Score 0.0 to 1.0. Stress test handling."

runtime:
  type: "http"
  port: 7860
  endpoints:
    reset: "/reset"
    step: "/step"
