version: "1.0"
env_id: "cloud-optimizer-cracking"

tasks:
  - id: "easy"
    difficulty: "easy"
    max_steps: 10
    grader: "environment.easy_grader"

  - id: "medium"
    difficulty: "medium"
    max_steps: 15
    grader: "environment.medium_grader"

  - id: "hard"
    difficulty: "hard"
    max_steps: 20
    grader: "environment.hard_grader"

runtime:
  type: "http"
  port: 7860
  endpoints:
    reset: "/reset"
    step: "/step"
